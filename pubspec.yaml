name: firebirdpod
description: Firebird-native Serverpod backend primitives and integration layers.
version: 0.1.0-dev
publish_to: none
repository: https://github.com/worajedt/firebirdpod

environment:
  sdk: ^3.8.0

dependencies:
  fbdb:
    path: ../firedart
  ffi: ^2.1.3
  meta: ^1.15.0
  serverpod:
    path: ../serverpod/packages/serverpod
  serverpod_database:
    path: ../serverpod/packages/serverpod_database
  serverpod_serialization:
    path: ../serverpod/packages/serverpod_serialization
  serverpod_shared:
    path: ../serverpod/packages/serverpod_shared

dev_dependencies:
  lints: ^6.1.0
  serverpod_auth_core_server:
    path: ../serverpod/modules/serverpod_auth/serverpod_auth_core/serverpod_auth_core_server
  serverpod_auth_idp_server:
    path: ../serverpod/modules/serverpod_auth/serverpod_auth_idp/serverpod_auth_idp_server
  test: ^1.25.8
  yaml: ^3.1.3

dependency_overrides:
  serverpod:
    path: ../serverpod/packages/serverpod
  serverpod_auth_core_server:
    path: ../serverpod/modules/serverpod_auth/serverpod_auth_core/serverpod_auth_core_server
  serverpod_database:
    path: ../serverpod/packages/serverpod_database
  serverpod_serialization:
    path: ../serverpod/packages/serverpod_serialization
  serverpod_shared:
    path: ../serverpod/packages/serverpod_shared
